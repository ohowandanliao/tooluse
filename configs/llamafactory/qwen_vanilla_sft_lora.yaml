model_name_or_path: REPLACE_WITH_MODEL_NAME_OR_PATH

stage: sft
do_train: true
finetuning_type: lora
lora_target: all

dataset_dir: data/llamafactory/pilot_v1
dataset: pilot_v1_vanilla_train
# pilot_v1 is a smoke dataset whose dev split is currently empty.
# Use the non-empty test split for local CLI validation only.
eval_dataset: pilot_v1_vanilla_test
template: qwen
cutoff_len: 2048
max_samples: 100000
overwrite_cache: true
preprocessing_num_workers: 8

output_dir: saves/pilot_v1/qwen_baseline_vanilla_lora
logging_steps: 10
save_steps: 200
plot_loss: true
overwrite_output_dir: true

per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 1.0e-4
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000

per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 200
report_to: none
