model_name_or_path: Qwen/Qwen2.5-0.5B-Instruct
trust_remote_code: true
quantization_bit: 4
quantization_method: bnb

stage: sft
do_train: true
do_predict: true
predict_with_generate: true
finetuning_type: lora
lora_rank: 8
lora_target: all

dataset_dir: data/llamafactory/pilot_v1
dataset: pilot_v1_schema_augmented_train
eval_dataset: pilot_v1_schema_augmented_test
template: qwen
cutoff_len: 1024
max_samples: 100000
overwrite_cache: true
preprocessing_num_workers: 2
dataloader_num_workers: 0

output_dir: /root/autodl-fs/tooluse-artifacts/runs/local_2080ti/pilot_v1/qwen25_05b_schema_augmented_qlora
logging_steps: 1
save_steps: 20
save_total_limit: 1
plot_loss: true
overwrite_output_dir: true
save_only_model: true
report_to: none

per_device_train_batch_size: 1
gradient_accumulation_steps: 1
learning_rate: 1.0e-4
num_train_epochs: 30.0
lr_scheduler_type: cosine
warmup_ratio: 0.0
fp16: true
ddp_timeout: 180000000

per_device_eval_batch_size: 1
eval_strategy: "no"
max_new_tokens: 128
